<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zahlung erfolgreich – Pizzeria Pinocchio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .check {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pop 0.4s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .highlight {
      background: #fff8f0;
      border: 1px solid #f0d9c0;
      border-radius: 10px;
      padding: 16px 20px;
      margin: 24px 0;
      color: #444;
      font-size: 15px;
    }
    .back-btn {
      display: inline-block;
      margin-top: 8px;
      background: #c0392b;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #a93226; }
    .logo {
      font-family: 'Playfair Display', serif;
      color: #c0392b;
      font-size: 18px;
      margin-bottom: 32px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍕 Pizzeria Pinocchio</div>
    <div class="check">✅</div>
    <h1>Zahlung erfolgreich!</h1>
    <p>Vielen Dank für deine Bestellung.</p>
    <div class="highlight">
      Wir haben deine Zahlung erhalten und bereiten deine Bestellung jetzt vor.<br><br>
      📞 Bei Fragen erreichst du uns unter <strong>02595 7688</strong>
    </div>
    <p style="font-size:14px; color:#999;">Geschätzte Lieferzeit: 30–45 Minuten</p>
    <br>
    <a href="/" class="back-btn">Zurück zur Speisekarte</a>
  </div>
</body>
</html>
